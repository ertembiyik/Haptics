<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-itunes-app" content="app-id=6503260004">
    <title>Invite</title>
    <style>
        /* System font stack */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #fff;
            color: #000;
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Dark theme support */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #000;
                color: #fff;
            }

            a {
                color: #4da6ff;
            }
        }

        /* Adapt the layout for mobile devices */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
        }

        /* Container fade-in for grouped sections */
        .section {
            opacity: 0;
            animation: fadeIn 0.8s forwards;
        }

        /* Grouped fade-in transitions */
        .section:nth-of-type(1) {
            animation-delay: 0s;
        }

        .section:nth-of-type(2) {
            animation-delay: 0.2s;
        }

        .section:nth-of-type(3) {
            animation-delay: 0.4s;
        }

        .section:nth-of-type(4) {
            animation-delay: 0.6s;
        }

        .section:nth-of-type(5) {
            animation-delay: 0.8s;
        }

        .section:nth-of-type(6) {
            animation-delay: 1s;
        }

        .section:nth-of-type(7) {
            animation-delay: 1.2s;
        }

        .section:nth-of-type(8) {
            animation-delay: 1.4s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        a {
            color: #007bff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Add spacing between sections */
        .section {
            margin-bottom: 2em;
        }
    </style>
</head>

<script>
    function showAppStoreLink() {
        document.location.href = "https://apps.apple.com/us/app/haptics-send-love-to-friends/id6503260004";
    }
</script>

<body>
    <div class="container">
        <div class="section">
            <h1>You've been invited to Haptics!</h1>
        </div>
    </div>
</body onLoad="showAppStoreLink()">

</html>
